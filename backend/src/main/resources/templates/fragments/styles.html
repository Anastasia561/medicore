<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:fragment="head">
        <style>
            body {
                font-family: Arial, sans-serif;
                color: #333;
                line-height: 1.5;
                margin: 0;
                padding: 0;
            }

            .content {
                max-width: 600px;
                margin: auto;
                padding: 20px;
                background-color: #fafafa;
            }

            .header {
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 15px;
                text-align: center;
            }

            .details {
                margin: 15px 0;
            }

            .footer {
                margin-top: 20px;
                font-size: 12px;
                color: #777;
            }

            a {
                color: #1a73e8;
            }
        </style>
    </th:block>
</head>
</html>
