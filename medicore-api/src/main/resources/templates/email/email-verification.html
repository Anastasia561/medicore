<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <th:block th:replace="~{fragments/styles :: head}"></th:block>
</head>
<body>
<div class="content">
    <th:block th:replace="~{fragments/logo :: logo}"></th:block>

    <div class="header">Email Verification</div>

    <p>Dear <span th:text="${firstName} + ' ' + ${lastName}"></span>,</p>

    <p>Thank you for registering with Medicore Clinic. Please verify your email address to complete your registration.</p>

    <th:block th:replace="~{fragments/url-button :: url-button(${url}, 'Verify Email')}"></th:block>

    <p>If you did not create an account, please ignore this email.</p>

    <p>Best regards,<br/>Medicore Clinic Team</p>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</div>
</body>
</html>
