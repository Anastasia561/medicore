spring:
  flyway:
    enabled: true
    locations:
      - filesystem:${user.dir}/flyway/sql/schema
      - classpath:flyway/sql

  mail:
    host: localhost
    port: 3025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

testcontainers:
  postgres:
    image: postgres:15-alpine
    username: ${TEST_USER}
    password: ${TEST_PASSWORD}
    database: ${TEST_DB}

app:
  jwt:
    secret: ${JWT_SECRET}
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET_TEST}
      region: ${AWS_S3_REGION_TEST}
